name: SITWallet CI/CD

# Trigger workflow whenever code is pushed to main
# or when a Pull Request is opened against main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Required for pushing Docker images to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

# Global variables used throughout the workflow
env:
  REGISTRY: ghcr.io

  # Backend image name
  BACKEND_IMAGE: ghcr.io/koksenglim0/sitwallet-backend

  # Frontend image name
  FRONTEND_IMAGE: ghcr.io/koksenglim0/sitwallet-frontend

jobs:
  build-and-push:

    # Name displayed in GitHub Actions UI
    name: Build and Push Docker Images

    # GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:

      # Step 1: Download repository source code
      - name: Checkout repository
        uses: actions/checkout@v4

      ###################################################
      # BACKEND CI
      ###################################################

      # Install Node.js for backend
      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Check backend dependencies for vulnerabilities
      # Fail pipeline if High/Critical vulnerabilities are found
      - name: Run backend audit
        working-directory: backend
        run: npm audit --audit-level=high

      ###################################################
      # FRONTEND CI
      ###################################################

      # Install Node.js for frontend
      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build frontend production files
      # Ensures React/Vite application compiles successfully
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      ###################################################
      # CONTAINER REGISTRY AUTHENTICATION
      ###################################################

      # Login to GitHub Container Registry (GHCR)
      # Uses GitHub's built-in token
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      ###################################################
      # DOCKER IMAGE BUILD
      ###################################################

      # Build backend Docker image
      - name: Build backend Docker image
        run: docker build -t $BACKEND_IMAGE:latest ./backend

      # Build frontend Docker image
      - name: Build frontend Docker image
        run: docker build -t $FRONTEND_IMAGE:latest ./frontend

      ###################################################
      # PUSH IMAGES TO CONTAINER REGISTRY
      ###################################################

      # Push backend image to GHCR
      - name: Push backend Docker image
        if: github.event_name == 'push'
        run: docker push $BACKEND_IMAGE:latest

      # Push frontend image to GHCR
      - name: Push frontend Docker image
        if: github.event_name == 'push'
        run: docker push $FRONTEND_IMAGE:latest