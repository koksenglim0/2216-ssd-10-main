name: SITWallet CI/CD

###################################################
# WORKFLOW TRIGGERS
###################################################
# Run the workflow whenever:
# 1. Code is pushed to the main branch
# 2. A Pull Request is opened against main
###################################################

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

###################################################
# REQUIRED PERMISSIONS
###################################################
# packages: write
# Allows GitHub Actions to push Docker images
# into GitHub Container Registry (GHCR)
###################################################

permissions:
  contents: read
  packages: write

###################################################
# GLOBAL VARIABLES
###################################################
# Define the image names once so they can be reused
# throughout the workflow.
###################################################

env:
  REGISTRY: ghcr.io

  # Backend Docker image
  BACKEND_IMAGE: ghcr.io/koksenglim0/sitwallet-backend

  # Frontend Docker image
  FRONTEND_IMAGE: ghcr.io/koksenglim0/sitwallet-frontend

###################################################
# JOB: BUILD, TEST, PUSH AND DEPLOY
###################################################

jobs:
  build-and-push:

    name: Build and Push Docker Images

    # GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:

      ###################################################
      # STEP 1 - CHECKOUT SOURCE CODE
      ###################################################
      # Downloads the latest source code from GitHub
      # onto the GitHub Actions runner.
      ###################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      ###################################################
      # BACKEND CONTINUOUS INTEGRATION (CI)
      ###################################################

      # Install Node.js for backend application
      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Security dependency scan
      # Pipeline fails if High severity vulnerabilities
      # are detected.
      - name: Run backend audit
        working-directory: backend
        run: npm audit --audit-level=high

      ###################################################
      # FRONTEND CONTINUOUS INTEGRATION (CI)
      ###################################################

      # Install Node.js for frontend application
      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build production-ready React/Vite application
      # Ensures source code compiles successfully
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      ###################################################
      # LOGIN TO GITHUB CONTAINER REGISTRY (GHCR)
      ###################################################
      # Authenticate GitHub Actions so Docker images
      # can be pushed into GitHub Container Registry.
      ###################################################

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

      ###################################################
      # BUILD DOCKER IMAGES
      ###################################################
      # Build backend and frontend Docker images.
      ###################################################

      - name: Build backend Docker image
        run: docker build -t $BACKEND_IMAGE:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t $FRONTEND_IMAGE:latest ./frontend

      ###################################################
      # PUSH IMAGES TO CONTAINER REGISTRY
      ###################################################
      # Store Docker images in GitHub Container Registry
      # so deployment servers can download them later.
      ###################################################

      - name: Push backend Docker image
        if: github.event_name == 'push'
        run: docker push $BACKEND_IMAGE:latest

      - name: Push frontend Docker image
        if: github.event_name == 'push'
        run: docker push $FRONTEND_IMAGE:latest

      ###################################################
      # CONTINUOUS DEPLOYMENT (CD)
      ###################################################
      # SSH into EC2
      # Pull latest images from GHCR
      # Restart containers using Docker Compose
      ###################################################

      - name: Deploy to EC2 with staging validation
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: student10
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cd_pipeline2

            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u koksenglim0 --password-stdin

            echo "Deploying staging environment..."
            sudo docker compose -f docker-compose.staging.yaml pull
            sudo docker compose -f docker-compose.staging.yaml up -d

            echo "Waiting for staging services to start..."
            sleep 30

            echo "Initialise staging DB only if missing..."
            if ! sudo docker exec sitwallet-staging-mysql mysql -uroot -prootpassword sitwallet -e "SHOW TABLES LIKE 'users';" | grep -q users; then
              sudo docker exec -i sitwallet-staging-mysql mysql -uroot -prootpassword < 001_schema_mysql57_all_procedures.sql
            else
              echo "Staging DB already initialized."
            fi

            echo "Running staging health check..."
            curl -f http://localhost:8081

            echo "Staging passed. Deploying production..."
            sudo docker compose -f docker-compose.yaml pull
            sudo docker compose -f docker-compose.yaml up -d

            echo "Waiting for production services to start..."
            sleep 20

            echo "Initialise production DB only if missing..."
            if ! sudo docker exec sitwallet-mysql mysql -uroot -prootpassword sitwallet -e "SHOW TABLES LIKE 'users';" | grep -q users; then
              sudo docker exec -i sitwallet-mysql mysql -uroot -prootpassword < 001_schema_mysql57_all_procedures.sql
            else
              echo "Production DB already initialized."
            fi

            echo "Running production health check..."
            curl -f http://localhost

            echo "Production healthy. Stopping staging environment..."
            sudo docker compose -f docker-compose.staging.yaml down

            echo "Deployment completed."
            sudo docker ps